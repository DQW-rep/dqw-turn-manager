<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DQW Turn Manager</title>
<style>
:root{--bg:#111;--card:#1b1b1b;--text:#eee;--border:#444}
body{font-family:sans-serif;background:var(--bg);color:var(--text);margin:12px}
input,textarea,button{font-size:16px}
input,textarea{width:100%;box-sizing:border-box;padding:8px}
button{padding:8px 12px;margin:4px}
.wrap{overflow-x:auto}
table{border-collapse:collapse;min-width:max-content;background:var(--card)}
th,td{border:1px solid var(--border);padding:4px;min-width:120px}
th.sticky,td.sticky{position:sticky;left:0;background:var(--card)}
</style>
</head>
<body>
<h2>DQW ターン管理</h2>

<label>ボス名</label>
<input id="boss">

<label>攻略メモ</label>
<textarea id="memo" rows="4"></textarea>

<div>
<button onclick="addTurn()">＋ターン</button>
<button onclick="removeTurn()">－ターン</button>
<button onclick="backup()">バックアップ</button>
<button onclick="restoreData()">復元</button>
</div>

<div class="wrap">
<table id="tbl">
<thead>
<tr id="hdr"><th class="sticky">キャラ</th><th>T1</th></tr>
</thead>
<tbody>
<tr><td class="sticky"><input value="ゴドハン"></td><td><input></td></tr>
<tr><td class="sticky"><input value="大神官"></td><td><input></td></tr>
<tr><td class="sticky"><input value="魔人"></td><td><input></td></tr>
<tr><td class="sticky"><input value="ニンジャ"></td><td><input></td></tr>
</tbody>
</table>
</div>

<script>
let turns=1;

function save(){
 const data={
  turns,
  boss:boss.value,
  memo:memo.value,
  rows:[...document.querySelectorAll("tbody tr")].map(r=>
    [...r.querySelectorAll("input")].map(i=>i.value))
 };
 localStorage.setItem("dqw_turn_manager",JSON.stringify(data));
}

function bind(){
 document.querySelectorAll("input,textarea").forEach(e=>e.oninput=save);
}

function addTurn(){
 turns++;
 const th=document.createElement("th");
 th.textContent="T"+turns;
 hdr.appendChild(th);
 document.querySelectorAll("tbody tr").forEach(r=>{
   const td=document.createElement("td");
   td.innerHTML="<input>";
   r.appendChild(td);
 });
 bind(); save();
}

function removeTurn(){
 if(turns<=1)return;
 turns--;
 hdr.removeChild(hdr.lastElementChild);
 document.querySelectorAll("tbody tr").forEach(r=>r.removeChild(r.lastElementChild));
 save();
}

function load(){
 const raw=localStorage.getItem("dqw_turn_manager");
 if(!raw){bind();return;}
 const d=JSON.parse(raw);
 boss.value=d.boss||"";
 memo.value=d.memo||"";
 while(turns<d.turns) addTurn();
 const rows=document.querySelectorAll("tbody tr");
 d.rows.forEach((arr,i)=>{
   arr.forEach((v,j)=>{
      const inp=rows[i].querySelectorAll("input")[j];
      if(inp) inp.value=v;
   });
 });
 bind();
}

function backup(){
 const txt=localStorage.getItem("dqw_turn_manager")||"";
 navigator.clipboard.writeText(txt);
 alert("バックアップデータをクリップボードへコピーしました");
}

function restoreData(){
 const txt=prompt("バックアップデータを貼り付け");
 if(!txt) return;
 localStorage.setItem("dqw_turn_manager",txt);
 location.reload();
}

load();
</script>
</body>
</html>

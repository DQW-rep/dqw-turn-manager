<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DQW攻略ノート v2</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee;margin:12px}
input,select,textarea,button{font-size:16px}
textarea,input{width:100%;box-sizing:border-box;padding:10px}
button{padding:10px;margin:4px}
.wrap{overflow-x:auto}
table{border-collapse:collapse;min-width:max-content}
th,td{border:1px solid #555;padding:4px;min-width:140px}
input.cell{height:52px;font-size:18px}
.sticky{position:sticky;left:0;background:#222;z-index:1}
</style>
</head>
<body>
<h2>DQW攻略ノート v2</h2>

<label>ボス名</label>
<input id="boss">

<label>攻略メモ</label>
<textarea id="memo" rows="4"></textarea>

<p>
<button onclick="addTurn()">＋ターン</button>
<button onclick="removeTurn()">－ターン</button>
</p>

<div class="wrap">
<table id="tbl">
<thead>
<tr id="hdr">
<th class="sticky">職業</th>
<th>T1</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

<script>
const jobs=["ゴッドハンド","大神官","ニンジャ","魔剣士","守り人","大魔道士","魔人","ドラゴン","天地雷鳴士"];
let turns=1;

function makeJob(v){
 let s=document.createElement("select");
 jobs.forEach(j=>{
   let o=document.createElement("option");
   o.value=j;o.textContent=j;
   if(j===v)o.selected=true;
   s.appendChild(o);
 });
 s.onchange=save;
 return s;
}

function makeCell(v=""){
 let i=document.createElement("input");
 i.className="cell";
 i.value=v;
 i.oninput=save;
 return i;
}

function addRow(name){
 let tr=document.createElement("tr");

 let td=document.createElement("td");
 td.className="sticky";

 if(name==="敵行動"){
   let i=makeCell(name);
   i.readOnly=true;
   td.appendChild(i);
 }else{
   td.appendChild(makeJob(name));
 }

 tr.appendChild(td);

 for(let t=0;t<turns;t++){
   let c=document.createElement("td");
   c.appendChild(makeCell());
   tr.appendChild(c);
 }
 body.appendChild(tr);
}

function init(){
 body.innerHTML="";
 addRow("敵行動");
 addRow("ゴッドハンド");
 addRow("大神官");
 addRow("魔人");
 addRow("ニンジャ");
}

function addTurn(){
 turns++;
 let th=document.createElement("th");
 th.textContent="T"+turns;
 hdr.appendChild(th);

 document.querySelectorAll("#body tr").forEach(r=>{
   let td=document.createElement("td");
   td.appendChild(makeCell());
   r.appendChild(td);
 });
 save();
}

function removeTurn(){
 if(turns<=1)return;
 turns--;
 hdr.removeChild(hdr.lastElementChild);
 document.querySelectorAll("#body tr").forEach(r=>r.removeChild(r.lastElementChild));
 save();
}

function save(){
 const data={
 turns,
 boss:boss.value,
 memo:memo.value,
 rows:[...body.rows].map(r=>
   [...r.cells].map((c,i)=>{
     const el=c.firstChild;
     return i===0 ? (el.tagName==="SELECT"?el.value:el.value) : el.value;
   })
 )
 };
 localStorage.setItem("dqw_v2",JSON.stringify(data));
}

function load(){
 const d=JSON.parse(localStorage.getItem("dqw_v2")||"null");
 init();
 if(!d)return;

 boss.value=d.boss||"";
 memo.value=d.memo||"";

 while(turns<d.turns)addTurn();

 [...body.rows].forEach((r,ri)=>{
   d.rows?.[ri]?.forEach((v,ci)=>{
     const el=r.cells[ci].firstChild;
     if(el) el.value=v;
   });
 });

 document.querySelectorAll("input,textarea,select").forEach(e=>{
   e.oninput=save;
   e.onchange=save;
 });
}

load();
document.querySelectorAll("input,textarea").forEach(e=>e.oninput=save);
</script>
</body>
</html>
